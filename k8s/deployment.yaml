apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-devops-app
  labels:
    app: simple-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-devops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: simple-devops-app
    spec:
      containers:
        - name: app
          image: thieubui/simple-devops-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: APP_ENV
              value: "k8s"
            - name: APP_VERSION
              value: "v1"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
