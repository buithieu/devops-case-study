version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    privileged: true
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-net

  simple-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: thieubui/simple-devops-app:latest
    container_name: simple-devops-app
    environment:
      - APP_ENV=local
      - APP_VERSION=local
    ports:
      - "3000:3000"
    depends_on:
      - jenkins
    networks:
      - jenkins-net

networks:
  jenkins-net:

volumes:
  jenkins_home:
